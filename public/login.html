<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuturazyBI — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0a0d14;
      --bg-card: rgba(18, 22, 34, 0.92);
      --accent: #4f9cf9;
      --accent-hover: #3a82e6;
      --accent-glow: rgba(79, 156, 249, 0.35);
      --text-primary: #e8eaf0;
      --text-muted: #7a85a0;
      --border: rgba(79, 156, 249, 0.18);
      --input-bg: rgba(255,255,255,0.05);
      --error: #f97070;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
      animation: orb-float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #4f9cf9, transparent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #7c5cbf, transparent); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #2dd4bf, transparent); top: 50%; left: 60%; animation-delay: -2s; }
    @keyframes orb-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid Pattern */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(79,156,249,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,156,249,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Card */
    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: card-in 0.5s ease;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #7c5cbf);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 0 32px var(--accent-glow);
      font-size: 28px; color: white;
    }
    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px; font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .brand h1 span { color: var(--accent); }
    .brand p {
      font-size: 13px; color: var(--text-muted); margin-top: 4px;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px;
      transition: color 0.2s;
    }
    .input-wrap input {
      width: 100%; padding: 14px 16px 14px 44px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      background: rgba(79,156,249,0.08);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-wrap input:focus + i,
    .input-wrap:focus-within i {
      color: var(--accent);
    }
    .input-wrap input::placeholder { color: rgba(122,133,160,0.6); }

    /* Toggle senha */
    .toggle-pass {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 15px;
      transition: color 0.2s; padding: 4px;
    }
    .toggle-pass:hover { color: var(--accent); }

    /* Error */
    .error-msg {
      display: none;
      align-items: center; gap: 8px;
      background: rgba(249,112,112,0.1);
      border: 1px solid rgba(249,112,112,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
      color: var(--error);
      font-size: 13px;
    }
    .error-msg.show { display: flex; animation: shake 0.3s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Submit Button */
    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), #3a65d6);
      color: white;
      border: none; border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.3px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(79,156,249,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(79,156,249,0.45);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center; margin-top: 28px;
      font-size: 12px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
        <h1>Futurazy<span>BI</span></h1>
        <p>Plataforma de Business Intelligence</p>
      </div>

      <div class="error-msg" id="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Usuário ou senha incorretos.</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário de rede" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">
              <i class="fa-solid fa-eye" id="toggle-pass-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <div class="spinner"></div>
          <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> &nbsp;Entrar</span>
        </button>
      </form>

      <div class="login-footer">
        FuturazyBI © 2026 — Acesso Restrito
      </div>
    </div>
  </div>

  <script>
    // Toggle mostrar/ocultar senha
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const input = document.getElementById('senha');
      const icon = document.getElementById('toggle-pass-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    });

    // Submit do formulário
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errorDiv = document.getElementById('error-msg');
      const errorText = document.getElementById('error-text');

      // Esconder erro anterior e mostrar loading
      errorDiv.classList.remove('show');
      btn.classList.add('loading');
      btn.disabled = true;

      const usuario = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, senha })
        });

        const data = await res.json();

        if (data.success) {
          // Redirecionar para o primeiro painel disponível ou para index
          const paineis = data.paineis || [];
          const painelMap = {
            'analise_trato': 'trato.html',
            'central_xml': 'notas.html',
            'fechamento_dre': 'fechamento.html',
            'fechamento_financeiro': 'fechamento_financeiro.html',
            'fechamento_receita': 'fechamento_receita.html',
            'fechamento_insumos': 'fechamento_insumos.html',
            'fechamento_pecuaria': 'fechamento_pecuaria.html',
            'admin_permissoes': 'admin_permissoes.html'
          };

          let destino = 'index.html';
          if (paineis.length > 0 && painelMap[paineis[0]]) {
            destino = painelMap[paineis[0]];
          }

          // TRUQUE PARA O NAVEGADOR OFERECER SALVAR A SENHA
          // Submetemos o formulário de verdade num iframe invisível para o browser
          // detectar a submissão, e logo em seguida fazemos o redirecionamento.
          const iframe = document.createElement('iframe');
          iframe.name = 'stealth_iframe';
          iframe.style.display = 'none';
          document.body.appendChild(iframe);

          const form = document.getElementById('login-form');
          form.target = 'stealth_iframe';
          form.action = '/login.html'; // action inofensivo
          form.method = 'POST';
          form.submit();

          // Aguarda um pequeno instante para o browser capturar o evento e redireciona
          setTimeout(() => {
            window.location.href = '/' + destino;
          }, 100);
        } else {
          errorText.textContent = data.error || 'Usuário ou senha incorretos.';
          errorDiv.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
          document.getElementById('senha').focus();
        }
      } catch (err) {
        errorText.textContent = 'Erro de conexão com o servidor. Tente novamente.';
        errorDiv.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    // Se já estiver logado, redirecionar
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/index.html';
    }).catch(() => {});
  </script>
</body>
</html>
