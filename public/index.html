<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuturazyBI — Início</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
    }
    .welcome-card {
      background: var(--card-bg, rgba(18,22,34,0.9));
      border: 1px solid var(--border-color, rgba(79,156,249,0.18));
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .welcome-logo {
      font-size: 64px;
      background: linear-gradient(135deg, #4f9cf9, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(79, 156, 249, 0.3));
    }
    .welcome-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #e8eaf0;
      margin-bottom: 12px;
    }
    .welcome-card p {
      color: #7a85a0;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .welcome-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #f59e0b;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <i class="fa-solid fa-chart-line logo-icon"></i>
        <h2>Futurazy<span>BI</span></h2>
      </div>
      <nav class="nav-menu" id="nav-menu"></nav>
      <div class="sidebar-user" id="sidebar-user"></div>
    </aside>

    <div class="content-wrapper">
      <main class="main-content">
        <div class="welcome-container">
          <div class="welcome-card">
            <div class="welcome-logo">
              <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="welcome-badge">
              <i class="fa-solid fa-triangle-exclamation"></i> Sem permissões ativas
            </div>
            <h1>Painel Gerencial Diretoria Futurazy</h1>
            <p>
              Olá! Você foi autenticado com sucesso no sistema. <br>
              No momento, seu usuário não possui nenhuma permissão vinculada aos painéis disponíveis.
              Por favor, solicite a liberação de acesso ao administrador de segurança do sistema.
            </p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="auth-check.js"></script>
</body>
</html>
